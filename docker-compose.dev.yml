services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    image: ""
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    environment:
      - INTERNAL_API_URL=http://api:8000
      - ORIGIN=http://localhost:8080

volumes:
  frontend-node-modules:
