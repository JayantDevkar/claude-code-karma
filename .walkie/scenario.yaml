        2. Verify fields:
           - "Your Name": should show ${{commander.user_id}}
           - "Machine": should show machine identifier
           - "Syncthing Version": should show version (e.g., v1.x.x)
           - "Device ID": should show device ID with copy button
        3. Click the copy button next to Device ID — verify checkmark appears
        4. "Reset Sync Setup" link at bottom (do NOT click)
        Take a screenshot of expanded Machine Details.
    expect:
