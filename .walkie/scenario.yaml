  # ============================================================
  # PHASE 15: Responder's /sync overview — cross-check
  # ============================================================

  - id: 43
    actor: responder
    name: "Browser: Verify /sync overview — responder perspective"
    action:
      type: browser
      url: "http://localhost:5173/sync"
      wait_for: "Syncthing: Connected"
      screenshot: true
      instruction: >
        Navigate to /sync on responder. Verify:
        1. "Syncthing: Connected" banner
        2. Stats row:
           - Teammates Online: 1/1 (commander is connected)
           - Projects: 1
           - Sessions Shared: N (responder's packaged sessions)
           - Sessions Received: N (received from commander — should be > 0)
        3. Project Sync Status: claude-code-karma row with packaged/local counts
        4. Recent Activity: events from responder's perspective
        Take a screenshot.
    expect:
      element_visible: "Syncthing: Connected"
      description: "Responder's sync overview with accurate stats and received sessions"

  # ============================================================
  # PHASE 16: Cross-check API data vs Browser display
  # ============================================================

  - id: 44
    actor: commander
    name: "API: Final cross-check — team activity events"
    action:
      type: api
      method: GET
      path: /sync/teams/page-test/activity?limit=50
    expect:
      status: 200
      description: >
        Verify the activity endpoint returns events for all actions taken:
        - team_created (step 5)
        - project_shared (step 7)
        - member_joined (step 10/12)
        - subscription_accepted (step 13)
        - session_packaged (steps 15-16)
        Count total events and verify it matches what the browser showed.

  - id: 45
    actor: responder
    name: "API: Final cross-check — members list dedup"
    action:
      type: api
      method: GET
      path: /sync/members
    expect:
      status: 200
      description: >
        Verify dedup: each member_tag appears exactly once.
        responder.is_you should be true for responder.member_tag.
        commander should show is_you=false.
        Total should be 2 (or more if other teams exist).

  # ============================================================
  # PHASE 17: Cleanup
  # ============================================================

  - id: 46
    actor: commander
    name: "Remove responder from team"
    action:
      type: api
      method: DELETE
      path: "/sync/teams/page-test/members/${{responder.member_tag}}"
    expect:
      status: 200

  - id: 47
    actor: responder
    name: "Reconcile to process removal"
    action:
      type: api
      method: POST
      path: /sync/reconcile
    expect:
      status: 200

  - id: 48
    actor: commander
    name: "Dissolve team"
    action:
      type: api
      method: DELETE
      path: /sync/teams/page-test
    expect:
      status: 200
      body_contains:
        status: "dissolved"

