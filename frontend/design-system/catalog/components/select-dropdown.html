<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SelectDropdown</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/preview.css">
<style>
.select-wrap { position:relative; display:inline-block; }
.select {
  appearance:none; -webkit-appearance:none;
  padding:8px 32px 8px 12px; font-size:14px; font-weight:500; font-family:var(--font-sans);
  background:var(--bg-base); color:var(--text-primary);
  border:1px solid var(--border); border-radius:var(--radius-md);
  outline:none; cursor:pointer;
  transition:box-shadow 150ms;
  min-width:200px;
}
.select:focus { box-shadow:0 0 0 2px var(--accent), 0 0 0 3px var(--bg-base); }
.select:disabled { opacity:.5; cursor:not-allowed; }
.chevron {
  position:absolute; inset-y:0; right:8px;
  display:flex; align-items:center; pointer-events:none;
  color:var(--text-muted);
}
/* inline SVG chevron matches lucide ChevronDown 14px */
label { display:block; font-size:12px; font-weight:500; color:var(--text-secondary); margin-bottom:6px; }
.field { width:240px; }
</style>
</head>
<body>
<div class="ds-frame">
<h1 class="ds-title">SelectDropdown</h1>
<p class="ds-subtitle">appearance:none + ChevronDown SVG, default + disabled — src/lib/components/ui/SelectDropdown.svelte</p>

<div class="ds-section">
<p class="ds-section-label">Default</p>
<div class="ds-row">
  <div class="field">
    <label>Sort sessions by</label>
    <div class="select-wrap">
      <select class="select">
        <option value="recent" selected>Most recent</option>
        <option value="oldest">Oldest first</option>
        <option value="messages">Most messages</option>
        <option value="duration">Longest duration</option>
      </select>
      <div class="chevron">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>
  </div>
</div>
</div>

<div class="ds-section">
<p class="ds-section-label">Another option set — model filter</p>
<div class="ds-row">
  <div class="field">
    <label>Filter by model</label>
    <div class="select-wrap">
      <select class="select">
        <option value="all" selected>All models</option>
        <option value="opus">claude-opus-4</option>
        <option value="sonnet">claude-sonnet-4-5</option>
        <option value="haiku">claude-haiku-3-5</option>
      </select>
      <div class="chevron">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>
  </div>
</div>
</div>

<div class="ds-section">
<p class="ds-section-label">Disabled</p>
<div class="ds-row">
  <div class="field">
    <label>Project (locked)</label>
    <div class="select-wrap">
      <select class="select" disabled>
        <option value="karma">claude-karma</option>
        <option value="hubdata">hubdata</option>
      </select>
      <div class="chevron">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>
  </div>
</div>
</div>
</div>
<button class="ds-theme-toggle" onclick="(function(r){var d=r.getAttribute('data-theme')==='dark';r.setAttribute('data-theme',d?'light':'dark');})(document.documentElement)">Toggle theme</button>
</body>
</html>
