<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KeyIndicator</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="../shared/preview.css">
<style>
.ki { display:inline-flex; align-items:center; gap:2px; }
kbd {
  display:inline-flex; align-items:center; justify-content:center;
  min-width:20px; height:20px; padding:0 6px;
  font-size:11px; font-weight:500; font-family:var(--font-sans);
  background:var(--bg-muted);
  border:1px solid var(--border);
  border-radius:4px;
  color:var(--text-secondary);
  box-shadow:0 1px 0 var(--border);
}
.ki-then { font-size:10px; color:var(--text-faint); margin:0 2px; }
</style>
</head>
<body>
<div class="ds-frame">
<h1 class="ds-title">KeyIndicator</h1>
<p class="ds-subtitle">kbd-styled key sequences — src/lib/components/ui/KeyIndicator.svelte</p>

<div class="ds-section">
<p class="ds-section-label">Single chord ⌘K</p>
<div class="ds-row">
  <span class="ki">
    <kbd>⌘</kbd><kbd>K</kbd>
  </span>
</div>
</div>

<div class="ds-section">
<p class="ds-section-label">Multi-modifier ⌥⇧P</p>
<div class="ds-row">
  <span class="ki">
    <kbd>⌥</kbd><kbd>⇧</kbd><kbd>P</kbd>
  </span>
</div>
</div>

<div class="ds-section">
<p class="ds-section-label">Sequential chord — G then T</p>
<div class="ds-row">
  <span class="ki">
    <kbd>G</kbd>
    <span class="ki-then">then</span>
    <kbd>T</kbd>
  </span>
</div>
</div>

<div class="ds-section">
<p class="ds-section-label">More examples</p>
<div class="ds-row">
  <span class="ki"><kbd>⌃</kbd><kbd>⇧</kbd><kbd>K</kbd></span>
  <span class="ki"><kbd>⌘</kbd><kbd>P</kbd></span>
  <span class="ki"><kbd>Esc</kbd></span>
  <span class="ki"><kbd>⇥</kbd></span>
  <span class="ki"><kbd>↵</kbd></span>
  <span class="ki"><kbd>⌫</kbd></span>
</div>
</div>

<div class="ds-section">
<p class="ds-section-label">Chord sequence — ⌘K then ⌘S</p>
<div class="ds-row">
  <span class="ki">
    <kbd>⌘</kbd><kbd>K</kbd>
    <span class="ki-then">then</span>
    <kbd>⌘</kbd><kbd>S</kbd>
  </span>
</div>
</div>
</div>
<button class="ds-theme-toggle" onclick="(function(r){var d=r.getAttribute('data-theme')==='dark';r.setAttribute('data-theme',d?'light':'dark');})(document.documentElement)">Toggle theme</button>
</body>
</html>
